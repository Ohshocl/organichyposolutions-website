# ================================================================
# ORGANIC HYPOSOLUTIONS - DEPLOYMENT WORKFLOW
# ================================================================
# Deploys static site to GitHub Pages on push to main.
#
# Critical files that MUST be in _site/:
#   - index.html
#   - shop/js/product-catalog.js  (single source of truth for products)
#   - templates/standard-nav.html (loaded dynamically by JS at runtime)
#   - templates/standard-footer.html
#
# Files EXCLUDED from _site/ (dev-only):
#   - .env.example, README.md, package.json, package-lock.json
#   - node_modules, .git, .github
#   - api/ (Vercel serverless functions — deployed separately)
#
# Last Updated: 2026-03-08
# ================================================================

name: Deploy OHS Website

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    # ----------------------------------------
    # Checkout
    # ----------------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ----------------------------------------
    # Node.js 20 (only needed if package.json exists)
    # ----------------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        if [ -f package.json ]; then
          echo "Installing dependencies..."
          npm install
        else
          echo "No package.json — skipping"
        fi

    # ----------------------------------------
    # Update sitemap lastmod dates to today
    # ----------------------------------------
    - name: Update Sitemap Dates
      run: |
        if [ -f "sitemap.xml" ]; then
          TODAY=$(date -u +"%Y-%m-%d")
          echo "Updating sitemap lastmod dates to ${TODAY}"
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "Sitemap dates updated"
        else
          echo "No sitemap.xml found — skipping"
        fi

    # ----------------------------------------
    # Prepare static site
    # ----------------------------------------
    - name: Prepare Static Site
      run: |
        mkdir -p _site

        # Copy everything into _site/
        cp -r * _site/ 2>/dev/null || true

        # ---- Remove dev/build files (NEVER deploy these) ----
        rm -rf _site/node_modules
        rm -rf _site/.git
        rm -rf _site/_site
        rm -rf _site/.github
        rm -rf _site/.env.example
        rm -rf _site/README.md
        rm -rf _site/package.json
        rm -rf _site/package-lock.json

        # ---- Remove Vercel API directory (deployed separately) ----
        rm -rf _site/api

        # ---- DO NOT remove _site/templates/ ----
        # Nav and footer are fetched at runtime by global-scripts.js.
        # Removing templates/ would break the entire site navigation.

        echo "Static site prepared"

    # ----------------------------------------
    # Validate critical files exist
    # ----------------------------------------
    - name: Validate Build
      run: |
        PASS=true

        # index.html — homepage
        if [ ! -f "_site/index.html" ]; then
          echo "FAIL: index.html missing from build"
          PASS=false
        fi

        # product-catalog.js — single source of truth for all product data
        if [ ! -f "_site/shop/js/product-catalog.js" ]; then
          echo "FAIL: shop/js/product-catalog.js missing from build"
          PASS=false
        fi

        # standard-nav.html — loaded dynamically, site breaks without it
        if [ ! -f "_site/templates/standard-nav.html" ]; then
          echo "FAIL: templates/standard-nav.html missing from build"
          PASS=false
        fi

        # standard-footer.html
        if [ ! -f "_site/templates/standard-footer.html" ]; then
          echo "WARN: templates/standard-footer.html missing (footer won't load)"
        fi

        if [ "$PASS" = false ]; then
          echo ""
          echo "Build validation FAILED — aborting deploy"
          exit 1
        fi

        echo "Build validation passed"

    # ----------------------------------------
    # Deploy to GitHub Pages
    # ----------------------------------------
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload to Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Deployment Summary
      run: |
        echo "Deployment complete: ${{ steps.deployment.outputs.page_url }}"
